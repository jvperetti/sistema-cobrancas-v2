<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Benefícios RH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <script type="text/javascript" src="/eel.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <canvas id="bgCanvas"></canvas>

    <div class="card custom-card p-5 shadow-lg text-center fade-in" style="max-width: 400px; width: 100%;">
        <img src="logo.png" alt="Nascimento" class="mb-4 mx-auto logo-neon" style="height: 80px; width: auto; object-fit: contain;">
        <h4 class="fw-bold text-white mb-4">Acesso Restrito</h4>
        
        <input type="text" id="login-user" class="form-control custom-input mb-3 py-2" placeholder="Usuário">
        <input type="password" id="login-pass" class="form-control custom-input mb-4 py-2" placeholder="Senha">
        
        <button onclick="fazerLogin()" class="btn btn-action-custom w-100 fw-bold py-2 fs-5">ENTRAR</button>
        <p id="login-erro" class="text-danger mt-3 fw-bold" style="display: none;"></p>
    </div>

    <script>
        async function fazerLogin() {
            let u = document.getElementById("login-user").value;
            let p = document.getElementById("login-pass").value;
            let err = document.getElementById("login-erro");
            
            if (!u || !p) { err.innerText = "Preencha todos os campos."; err.style.display = "block"; return; }
            
            let res = await eel.autenticar_usuario(u, p)();
            
            if (res.status === "sucesso") {
                window.location.href = "index.html"; // Vai para a tela principal!
            } else {
                err.innerText = res.mensagem;
                err.style.display = "block";
            }
        }

        document.getElementById('login-pass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fazerLogin();
        });
    </script>
    
</body>
</html>
